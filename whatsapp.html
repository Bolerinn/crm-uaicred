<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp - Rede Prime</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{accent:'#f97316',gold:'#b8860b',sidebar:'#111b21','sidebar-hover':'#202c33','sidebar-active':'#2a3942','header-bg':'#f0f2f5'}}}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#app{height:100%;width:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
#sidebar{width:380px;min-width:320px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #222d34}
#sidebar .hdr{background:#202c33;padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:60px}
#sidebar .hdr .av{width:42px;height:42px;border-radius:50%;background:#f97316;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;flex-shrink:0}
#sidebar .hdr .inf{flex:1;min-width:0}
#sidebar .hdr .nm{color:#e9edef;font-size:16px;font-weight:500}
#sidebar .hdr .rl{color:#8696a0;font-size:13px}
#sidebar .hdr .st{width:12px;height:12px;border-radius:50%;flex-shrink:0}
#sidebar .hdr .st.on{background:#22c55e}
#sidebar .hdr .st.off{background:#ef4444}
.srch{padding:8px 12px;background:#111b21}
.srch .si{background:#202c33;border-radius:8px;display:flex;align-items:center;padding:0 12px;height:38px}
.srch .si svg{color:#8696a0;flex-shrink:0}
.srch .si input{flex:1;background:transparent;border:none;outline:none;color:#d1d7db;font-size:14px;padding:0 16px 0 12px;height:100%}
.srch .si input::placeholder{color:#8696a0}
#glist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#374045 #111b21}
#glist::-webkit-scrollbar{width:6px}
#glist::-webkit-scrollbar-track{background:#111b21}
#glist::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}
.gi{display:flex;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid #182229;transition:background .15s;gap:12px}
.gi:hover{background:#202c33}
.gi.active{background:#2a3942}
.gi .ga{width:49px;height:49px;border-radius:50%;background:#374045;display:flex;align-items:center;justify-content:center;color:#d1d7db;font-weight:500;font-size:18px;flex-shrink:0}
.gi .gf{flex:1;min-width:0}
.gi .gn{color:#e9edef;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gi .gu{color:#8696a0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.gi .gm{text-align:right;flex-shrink:0}
.gi .gh{color:#8696a0;font-size:11px}
.gi .gb{background:#f97316;color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:20px;text-align:center;margin-top:4px;display:inline-block}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8696a0;padding:24px;text-align:center}
#empty svg{margin-bottom:16px;opacity:.5}
#empty p{font-size:14px}
#empty button{margin-top:16px;background:#f97316;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer}
#empty button:hover{background:#ea580c}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8696a0}
.spin{width:32px;height:32px;border:3px solid #374045;border-top-color:#f97316;border-radius:50%;animation:sp .8s linear infinite;margin:20px auto}
@keyframes sp{to{transform:rotate(360deg)}}
#chat{flex:1;display:flex;flex-direction:column;background:#efeae2;position:relative;overflow:hidden}
#chat::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h400v400H0z' fill='%23efeae2'/%3E%3Cpath d='M200 200c-40 0-72.5 32.5-72.5 72.5S160 345 200 345s72.5-32.5 72.5-72.5S240 200 200 200z' fill='%23d4c8b6' opacity='.08'/%3E%3C/svg%3E") repeat;pointer-events:none}
.ch{background:#f0f2f5;padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:60px;z-index:1;border-bottom:1px solid #d1d7db}
.ch .ca{width:42px;height:42px;border-radius:50%;background:#dfe5e7;display:flex;align-items:center;justify-content:center;color:#54656f;font-weight:600;font-size:18px;flex-shrink:0}
.ch .ci{flex:1;min-width:0}
.ch .cn{font-size:17px;font-weight:500;color:#111b21}
.ch .cm{font-size:13px;color:#667781}
.ch .bb{color:#54656f;cursor:pointer;padding:8px;border-radius:50%;font-size:20px}
#cph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;color:#667781;text-align:center;padding:24px}
#cph svg{margin-bottom:20px;opacity:.6}
#cph h2{font-size:24px;font-weight:300;color:#41525d;margin-bottom:12px}
#cph p{font-size:14px;max-width:500px;line-height:1.6}
#cmsg{flex:1;overflow-y:auto;padding:20px 50px;display:none;flex-direction:column;gap:6px;z-index:1;scrollbar-width:thin;scrollbar-color:#c1c1c1 transparent}
#cmsg.show{display:flex}
#cmsg::-webkit-scrollbar{width:6px}
#cmsg::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
.mr{display:flex;margin-bottom:2px}
.mr.out{justify-content:flex-end}
.mb{max-width:65%;padding:6px 12px 6px 9px;border-radius:8px;position:relative;font-size:14.2px;line-height:1.4;word-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.08)}
.mr.in .mb{background:#fff;border-radius:0 8px 8px 8px}
.mr.out .mb{background:#d9fdd3;border-radius:8px 0 8px 8px}
.mm{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:2px;font-size:11px;color:#667781}
.mr.out .mm{color:#53bdeb}
.mm .mh{font-size:11px}
.ms{font-size:12.5px;font-weight:600;color:#f97316;margin-bottom:2px}
.md{text-align:center;margin:12px 0;z-index:1}
.md span{background:#e1f2fb;color:#54656f;font-size:12.5px;padding:5px 12px;border-radius:5px;box-shadow:0 1px 1px rgba(0,0,0,.08)}
#cinp{background:#f0f2f5;padding:8px 12px;display:none;align-items:center;gap:10px;z-index:1;border-top:1px solid #d1d7db}
#cinp.show{display:flex}
#cinp textarea{flex:1;background:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:15px;resize:none;outline:none;max-height:100px;min-height:42px;font-family:inherit;line-height:1.4}
#cinp .sb{width:42px;height:42px;border-radius:50%;background:#f97316;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;color:#fff;flex-shrink:0}
#cinp .sb:hover{background:#ea580c}
#cinp .sb:disabled{background:#8696a0;cursor:not-allowed}
#toast{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.25);animation:ti .3s ease,to .3s ease 3.2s forwards;max-width:360px;pointer-events:auto}
.toast.ok{border-left:4px solid #22c55e}
.toast.er{border-left:4px solid #ef4444}
@keyframes ti{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes to{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(50px)}}
@media(max-width:768px){
  #sidebar{width:100%;min-width:100%;position:absolute;left:0;top:0;bottom:0;z-index:10;transition:transform .3s}
  #sidebar.hm{transform:translateX(-100%)}
  #chat{position:absolute;left:0;top:0;right:0;bottom:0}
  .ch .bb{display:block}
  #cmsg{padding:15px 12px}
}
</style>
</head>
<body>

<div id="app" style="display:flex;height:100%">
  <div id="sidebar">
    <div class="hdr">
      <div class="av">WA</div>
      <div class="inf">
        <div class="nm" id="un">WhatsApp</div>
        <div class="rl" id="ur">conectando...</div>
      </div>
      <div class="st off" id="st"></div>
    </div>
    <div class="srch">
      <div class="si">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3 0-3.7-3-6.7-6.7-6.7S3 6 3 9.7s3 6.7 6.7 6.7c1.6 0 3.2-.6 4.3-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5-5.2zm-6.2 0c-2.6 0-4.6-2.1-4.6-4.6 0-2.6 2.1-4.6 4.6-4.6 2.6 0 4.6 2.1 4.6 4.6 0 2.6-2 4.6-4.6 4.6z"/></svg>
        <input type="text" id="si" placeholder="Pesquisar conversas..." oninput="filterChats()">
      </div>
    </div>
    <div id="glist">
      <div id="loading"><div class="spin"></div><p>Conectando ao WhatsApp...</p></div>
    </div>
  </div>

  <div id="chat">
    <div class="ch" id="chh" style="display:none">
      <div class="bb" id="bb" onclick="backToList()">←</div>
      <div class="ca" id="cav">G</div>
      <div class="ci">
        <div class="cn" id="cnm">Selecione uma conversa</div>
        <div class="cm" id="cmb"></div>
      </div>
    </div>
    <div id="cph">
      <div id="qr-area" style="margin-bottom:20px;display:none">
        <canvas id="qr-canvas" style="background:#fff;padding:16px;border-radius:12px"></canvas>
        <p style="font-size:13px;margin-top:12px;color:#667781">Escaneie com o WhatsApp → Aparelhos Conectados</p>
      </div>
      <svg viewBox="0 0 303 172" width="250" height="140" fill="none"><rect x="0.5" y="0.5" width="302" height="171" rx="7.5" fill="#fff" stroke="#e9edef"/><circle cx="55" cy="48" r="20" fill="#dfe5e7"/><circle cx="151" cy="48" r="20" fill="#dfe5e7"/><circle cx="247" cy="48" r="20" fill="#dfe5e7"/><rect x="20" y="84" width="262" height="12" rx="6" fill="#dfe5e7"/><rect x="20" y="104" width="200" height="12" rx="6" fill="#dfe5e7"/><rect x="20" y="124" width="240" height="12" rx="6" fill="#dfe5e7"/></svg>
      <h2>WhatsApp Web</h2>
      <p>Selecione uma conversa à esquerda para ver as mensagens.</p>
    </div>
    <div id="cmsg"></div>
    <div id="cinp">
      <textarea id="mi" rows="1" placeholder="Digite uma mensagem..." disabled oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
      <button class="sb" id="sb" disabled onclick="sendMsg()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var API='http://localhost:3456',chats=[],activeChat=null,messagesCache={},pollTimer=null;

function esc(s){if(!s)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML}
function initN(n){if(!n)return'?';var p=String(n).trim().split(/\s+/);return p.length===1?p[0].substring(0,2).toUpperCase():(p[0].charAt(0)+p[p.length-1].charAt(0)).toUpperCase()}
function fH(ts){if(!ts)return'';var d=new Date(ts*1000);return isNaN(d.getTime())?'':String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fD(ts){if(!ts)return'';var d=new Date(ts*1000);if(isNaN(d.getTime()))return'';var m=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];var h=new Date();h.setHours(0,0,0,0);var o=new Date(h);o.setDate(o.getDate()-1);var dm=new Date(d);dm.setHours(0,0,0,0);if(dm.getTime()===h.getTime())return'Hoje';if(dm.getTime()===o.getTime())return'Ontem';return d.getDate()+' de '+m[d.getMonth()]+' de '+d.getFullYear()}
function toast(m,t){t=t||'';var e=document.createElement('div');e.className='toast '+(t==='ok'?'ok':t==='er'?'er':'');e.textContent=m;document.getElementById('toast').appendChild(e);setTimeout(function(){if(e.parentNode)e.remove()},3600)}

function showQR(qrText){
  var area=document.getElementById('qr-area'),canvas=document.getElementById('qr-canvas');
  area.style.display='block';
  canvas.innerHTML='';
  try{new QRCode(canvas,{text:qrText,width:250,height:250,colorDark:'#111b21',colorLight:'#ffffff'})}catch(e){canvas.textContent='QR: '+qrText}
}

async function checkStatus(){
  try{
    var r=await fetch(API+'/api/status');
    if(!r.ok)throw new Error('offline');
    var d=await r.json();
    if(d.online){
      document.getElementById('st').className='st on';
      document.getElementById('ur').textContent='conectado';
      document.getElementById('qr-area').style.display='none';
      return true;
    }
    if(d.qr){
      document.getElementById('st').className='st off';
      document.getElementById('ur').textContent='escaneie o QR';
      showQR(d.qr);
      return false;
    }
  }catch(e){}
  document.getElementById('st').className='st off';
  document.getElementById('ur').textContent='desconectado';
  return false;
}

async function loadChats(){
  try{
    var r=await fetch(API+'/api/chats');
    if(!r.ok)throw new Error('erro');
    chats=await r.json();
    renderChatList();
    document.getElementById('loading').style.display='none';
  }catch(e){
    document.getElementById('loading').innerHTML='<div id="empty" style="display:flex"><svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><p>Servidor WhatsApp não encontrado</p><p style="font-size:12px;margin-top:4px">Inicie o servidor com: cd whatsapp-bot && node server.js</p></div>';
  }
}

function renderChatList(filter){
  var c=document.getElementById('glist'),its=c.querySelectorAll('.gi');
  for(var i=0;i<its.length;i++)its[i].remove();
  var empty=document.getElementById('empty');if(empty)empty.style.display='none';
  var lst=filter?chats.filter(function(g){return(g.name||'').toLowerCase().indexOf(filter.toLowerCase())!==-1}):chats;
  if(lst.length===0){
    var dv=document.createElement('div');dv.id='empty';dv.innerHTML='<p>Nenhuma conversa encontrada</p>';c.appendChild(dv);
    return
  }
  for(var j=0;j<lst.length;j++){
    var g=lst[j],el=document.createElement('div');
    el.className='gi'+(activeChat&&activeChat.id===g.id?' active':'');
    el.setAttribute('data-id',g.id);
    el.innerHTML='<div class="ga">'+esc(initN(g.name))+'</div><div class="gf"><div class="gn">'+esc(g.name||'Desconhecido')+'</div><div class="gu">'+(g.lastMessage?esc(g.lastMessage.substring(0,40)):g.isGroup?'Grupo':'')+'</div></div><div class="gm"><div class="gh">'+(g.timestamp?fH(g.timestamp):'')+'</div>'+(g.unreadCount>0?'<div class="gb">'+g.unreadCount+'</div>':'')+'</div>';
    el.addEventListener('click',(function(gr){return function(){selectChat(gr)}})(g));
    c.appendChild(el)
  }
}

function filterChats(){
  var q=document.getElementById('si').value.trim().toLowerCase();
  renderChatList(q)
}

function selectChat(g){
  activeChat=g;
  var its=document.getElementById('glist').querySelectorAll('.gi');
  for(var i=0;i<its.length;i++)its[i].classList.toggle('active',its[i].getAttribute('data-id')===String(g.id));
  document.getElementById('chh').style.display='flex';
  document.getElementById('cph').style.display='none';
  document.getElementById('cmsg').classList.add('show');
  document.getElementById('cinp').classList.add('show');
  document.getElementById('cnm').textContent=g.name||'Desconhecido';
  document.getElementById('cav').textContent=initN(g.name);
  document.getElementById('cmb').textContent=g.isGroup?'Grupo':'';
  document.getElementById('mi').disabled=false;
  document.getElementById('sb').disabled=false;
  loadMessages(g.id);
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.add('hm')
}

async function loadMessages(chatId){
  document.getElementById('cmsg').innerHTML='<div class="spin"></div>';
  try{
    var r=await fetch(API+'/api/messages/'+encodeURIComponent(chatId));
    if(!r.ok)throw new Error('erro');
    var ms=await r.json();
    messagesCache[chatId]=ms;
    renderMessages(ms,chatId)
  }catch(e){
    document.getElementById('cmsg').innerHTML='<div style="text-align:center;color:#667781;padding:40px">Erro ao carregar mensagens.</div>'
  }
}

function renderMessages(ms,chatId){
  if(!activeChat||activeChat.id!==chatId)return;
  document.getElementById('cmsg').innerHTML='';
  if(ms.length===0){document.getElementById('cmsg').innerHTML='<div style="text-align:center;color:#667781;padding:40px">Nenhuma mensagem.</div>';return}
  var ld='';
  for(var i=0;i<ms.length;i++){
    var m=ms[i],da=fD(m.timestamp);
    if(da!==ld){ld=da;var dv=document.createElement('div');dv.className='md';dv.innerHTML='<span>'+esc(da)+'</span>';document.getElementById('cmsg').appendChild(dv)}
    var out=m.fromMe,row=document.createElement('div');
    row.className='mr '+(out?'out':'in');
    var sh='';
    if(!out&&m.author)sh='<div class="ms">'+esc(m.author)+'</div>';
    row.innerHTML='<div class="mb">'+sh+'<span>'+(m.body?esc(m.body):m.hasMedia?'📎 Mídia':'')+'</span><div class="mm"><span class="mh">'+esc(fH(m.timestamp))+'</span></div></div>';
    document.getElementById('cmsg').appendChild(row)
  }
  document.getElementById('cmsg').scrollTop=document.getElementById('cmsg').scrollHeight
}

async function sendMsg(){
  if(!activeChat)return;
  var t=document.getElementById('mi').value.trim();
  if(!t)return;
  document.getElementById('sb').disabled=true;
  document.getElementById('mi').disabled=true;
  try{
    var r=await fetch(API+'/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:activeChat.id,message:t})});
    document.getElementById('sb').disabled=false;
    document.getElementById('mi').disabled=false;
    document.getElementById('mi').value='';
    document.getElementById('mi').focus();
    if(!r.ok){var e=await r.json();toast(e.error||'Erro ao enviar','er');return}
    await loadMessages(activeChat.id)
  }catch(e){
    document.getElementById('sb').disabled=false;
    document.getElementById('mi').disabled=false;
    toast('Erro de conexão com o servidor','er')
  }
}

function backToList(){
  activeChat=null;
  document.getElementById('chh').style.display='none';
  document.getElementById('cph').style.display='flex';
  document.getElementById('cmsg').classList.remove('show');
  document.getElementById('cinp').classList.remove('show');
  document.getElementById('mi').value='';
  var its=document.getElementById('glist').querySelectorAll('.gi');
  for(var i=0;i<its.length;i++)its[i].classList.remove('active');
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('hm')
}

document.getElementById('mi').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
});
window.addEventListener('resize',function(){if(window.innerWidth>768)document.getElementById('sidebar').classList.remove('hm')});

// Poll for status changes and new messages
async function poll(){
  var ok=await checkStatus();
  if(ok&&!chats.length)await loadChats();
  if(ok&&activeChat)await loadMessages(activeChat.id);
}

// Start
(async function init(){
  await checkStatus();
  await loadChats();
  pollTimer=setInterval(poll,5000);
})();
</script>
</body>
</html>
