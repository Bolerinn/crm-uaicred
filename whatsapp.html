<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp — Rede Prime</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111b21;color:#e9edef;font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden}

/* ===== Loading / QR / Error states ===== */
#state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;padding:24px;text-align:center}
#state-screen h1{color:#f97316;font-size:26px;font-weight:700}
#state-screen p{color:#8696a0;font-size:15px;max-width:400px;line-height:1.5}
#state-screen img{background:#fff;padding:14px;border-radius:14px;max-width:280px;max-height:280px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
#state-screen .spinner{width:40px;height:40px;border:4px solid #2a3942;border-top-color:#f97316;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#state-screen .qr-sub{font-size:13px;color:#667781;margin-top:-4px}
#state-screen .error-detail{color:#ef4444;font-size:13px;background:#1a1a1a;padding:10px 16px;border-radius:8px}

/* ===== Main app layout ===== */
#app{display:none;height:100vh;width:100vw}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#202c33;border-bottom:1px solid #313d45;height:56px;flex-shrink:0}
.app-header .title{font-size:16px;font-weight:600}
.app-header .status{display:flex;align-items:center;gap:6px;font-size:12px;color:#00a884}
.app-header .status .dot{width:8px;height:8px;border-radius:50%;background:#00a884}
.app-wrapper{display:flex;height:calc(100vh - 56px)}

/* ===== Sidebar ===== */
.sidebar{width:320px;min-width:320px;background:#111b21;border-right:1px solid #313d45;display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{display:flex;align-items:center;padding:8px 12px;gap:8px;border-bottom:1px solid #313d45}
.sidebar-top input{flex:1;background:#2a3942;border:none;border-radius:8px;padding:8px 12px;color:#e9edef;font-size:14px;outline:none}
.sidebar-top input::placeholder{color:#8696a0}
.sidebar-top .new-chat-btn{background:#f97316;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.sidebar-top .new-chat-btn:hover{background:#ea6a0b}
.chat-list{flex:1;overflow-y:auto;overflow-x:hidden}
.chat-list::-webkit-scrollbar{width:6px}
.chat-list::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}
.chat-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid #1f2a30;transition:background .1s}
.chat-item:hover{background:#202c33}
.chat-item.active{background:#2a3942}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:#374045;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;overflow:hidden;position:relative}
.chat-avatar .group-badge{position:absolute;bottom:-2px;right:-2px;font-size:14px}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:16px;font-weight:400;color:#e9edef;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:11px;color:#8696a0;white-space:nowrap}
.chat-unread{background:#00a884;color:#111b21;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* ===== Chat panel ===== */
.chat-panel{flex:1;display:flex;flex-direction:column;background:#0b141a;position:relative;overflow:hidden}
.chat-panel .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:#8696a0;font-size:15px}
.chat-panel .empty-state .icon{font-size:48px;margin-bottom:8px}
.chat-panel .chat-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#202c33;border-bottom:1px solid #313d45;min-height:56px}
.chat-panel .chat-header .back-btn{display:none;background:none;border:none;color:#e9edef;font-size:20px;cursor:pointer;padding:4px}
.chat-panel .chat-header .chat-header-info{flex:1;min-width:0}
.chat-panel .chat-header .chat-header-name{font-size:16px;font-weight:500}
.chat-panel .chat-header .chat-header-sub{font-size:12px;color:#8696a0;margin-top:1px}
.messages-area{flex:1;overflow-y:auto;padding:16px 48px;display:flex;flex-direction:column;gap:4px}
.messages-area::-webkit-scrollbar{width:6px}
.messages-area::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}
.message-row{display:flex;flex-direction:column;max-width:65%;margin-bottom:2px}
.message-row.sent{align-self:flex-end;align-items:flex-end}
.message-row.received{align-self:flex-start;align-items:flex-start}
.message-author{font-size:11px;color:#00a884;font-weight:500;margin:0 8px 2px 8px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.message-bubble{padding:6px 8px 6px 8px;border-radius:6px;font-size:14px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap;position:relative}
.message-row.sent .message-bubble{background:#005c4b;color:#e9edef;border-top-right-radius:2px}
.message-row.received .message-bubble{background:#202c33;color:#e9edef;border-top-left-radius:2px}
.message-time{font-size:11px;color:#8696a0;margin-left:6px;white-space:nowrap;float:right;margin-top:2px}
.message-row.sent .message-time{color:#ffffff80}

/* Input area */
.input-area{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#202c33;border-top:1px solid #313d45}
.input-area input{flex:1;background:#2a3942;border:none;border-radius:8px;padding:10px 14px;color:#e9edef;font-size:15px;outline:none}
.input-area input::placeholder{color:#8696a0}
.input-area .send-btn{background:#f97316;border:none;border-radius:50%;width:42px;height:42px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.input-area .send-btn:hover{background:#ea6a0b}
.input-area .send-btn:disabled{background:#374045;color:#667781;cursor:not-allowed}
.input-area .error-msg{color:#ef4444;font-size:12px;flex-shrink:0}

/* ===== Responsive ===== */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:56px;bottom:0;z-index:10;width:100%;min-width:100%;display:none}
  .sidebar.open{display:flex}
  .chat-panel .chat-header .back-btn{display:block}
  .messages-area{padding:12px 12px}
  .message-row{max-width:85%}
}

/* ===== Scroll anchor ===== */
#scroll-anchor{height:1px}
</style>
</head>
<body>

<!-- ========== STATE SCREEN (loading / qr / error) ========== -->
<div id="state-screen">
  <div class="spinner" id="state-spinner"></div>
  <h1 id="state-title">WhatsApp — Rede Prime</h1>
  <p id="state-desc">⏳ Conectando ao servidor WhatsApp...</p>
  <div id="state-qr-wrap" style="display:none">
    <img id="qr-img" src="" alt="QR Code">
  </div>
  <p id="state-sub" class="qr-sub" style="display:none">Escaneie o QR Code com o WhatsApp do escritório</p>
  <div id="state-error" class="error-detail" style="display:none"></div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="app">
  <div class="app-header">
    <div class="title">WhatsApp — Rede Prime</div>
    <div class="status"><span class="dot"></span> ONLINE</div>
  </div>
  <div class="app-wrapper">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <input type="text" id="search-input" placeholder="🔍 Buscar conversa..." autocomplete="off">
        <button class="new-chat-btn" id="new-chat-btn" title="Nova conversa">+</button>
      </div>
      <div class="chat-list" id="chat-list"></div>
    </div>
    <!-- Chat panel -->
    <div class="chat-panel" id="chat-panel">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <div>Selecione uma conversa</div>
        <div style="font-size:13px">ou clique em + para iniciar uma nova</div>
      </div>
      <div id="chat-content" style="display:none;flex-direction:column;flex:1">
        <div class="chat-header">
          <button class="back-btn" id="back-btn">←</button>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-header-name"></div>
            <div class="chat-header-sub" id="chat-header-sub"></div>
          </div>
        </div>
        <div class="messages-area" id="messages-area">
          <div id="scroll-anchor"></div>
        </div>
        <div class="input-area">
          <input type="text" id="msg-input" placeholder="📝 Digite sua mensagem..." autocomplete="off">
          <button class="send-btn" id="send-btn">➤</button>
          <span id="send-error" class="error-msg" style="display:none"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let chats = [];
let chatAtivo = null;
let chatAtivoId = null;
let pollChatInterval = null;
let pollChatsInterval = null;
let pollStatusInterval = null;
let online = false;
let sending = false;

// ===== DOM refs =====
const stateScreen = document.getElementById('state-screen');
const appEl = document.getElementById('app');
const stateSpinner = document.getElementById('state-spinner');
const stateTitle = document.getElementById('state-title');
const stateDesc = document.getElementById('state-desc');
const stateQrWrap = document.getElementById('state-qr-wrap');
const qrImg = document.getElementById('qr-img');
const stateSub = document.getElementById('state-sub');
const stateError = document.getElementById('state-error');
const chatList = document.getElementById('chat-list');
const searchInput = document.getElementById('search-input');
const newChatBtn = document.getElementById('new-chat-btn');
const emptyState = document.getElementById('empty-state');
const chatContent = document.getElementById('chat-content');
const chatHeaderName = document.getElementById('chat-header-name');
const chatHeaderSub = document.getElementById('chat-header-sub');
const messagesArea = document.getElementById('messages-area');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const sendError = document.getElementById('send-error');
const backBtn = document.getElementById('back-btn');
const sidebar = document.getElementById('sidebar');

// ===== HELPERS =====
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) {
    // Try as unix seconds
    const n = Number(ts);
    if (!isNaN(n) && n > 1e8) {
      const d2 = new Date(n * 1000);
      if (!isNaN(d2.getTime())) {
        return d2.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
      }
    }
    return '';
  }
  return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) {
    const n = Number(ts);
    if (!isNaN(n) && n > 1e8) {
      const d2 = new Date(n * 1000);
      if (!isNaN(d2.getTime())) return fmtDate(d2.toISOString());
    }
    return '';
  }
  const now = new Date();
  const sameDay = d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate()-1);
  const isYesterday = d.getFullYear()===yesterday.getFullYear() && d.getMonth()===yesterday.getMonth() && d.getDate()===yesterday.getDate();
  if (sameDay) return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  if (isYesterday) return 'Ontem';
  return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '…' : str;
}

// ===== FETCH =====
async function apiGet(path) {
  try {
    const r = await fetch(path, {cache:'no-cache'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } catch(e) {
    throw e;
  }
}

async function apiGetText(path) {
  try {
    const r = await fetch(path, {cache:'no-cache'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    return await r.text();
  } catch(e) {
    throw e;
  }
}

// ===== RENDER QR / LOADING / ERROR =====
function showLoading() {
  stateScreen.style.display = 'flex';
  appEl.style.display = 'none';
  stateSpinner.style.display = 'block';
  stateQrWrap.style.display = 'none';
  stateSub.style.display = 'none';
  stateError.style.display = 'none';
  stateDesc.textContent = '⏳ Conectando ao servidor WhatsApp...';
  stateDesc.style.color = '#8696a0';
}

function showQR(dataUrl) {
  stateScreen.style.display = 'flex';
  appEl.style.display = 'none';
  stateSpinner.style.display = 'none';
  stateQrWrap.style.display = dataUrl ? 'block' : 'none';
  stateSub.style.display = dataUrl ? 'block' : 'none';
  stateError.style.display = dataUrl ? 'none' : 'block';
  if (dataUrl) {
    qrImg.src = dataUrl;
    stateError.textContent = '';
  } else {
    stateError.textContent = '⏳ QR Code sendo gerado...';
  }
  stateDesc.textContent = '📱 WhatsApp — Rede Prime';
  stateDesc.style.color = '#e9edef';
}

function showError(msg) {
  stateScreen.style.display = 'flex';
  appEl.style.display = 'none';
  stateSpinner.style.display = 'none';
  stateQrWrap.style.display = 'none';
  stateSub.style.display = 'none';
  stateError.style.display = 'block';
  stateError.textContent = '⚠ ' + msg;
  stateDesc.textContent = '📱 WhatsApp — Rede Prime';
  stateDesc.style.color = '#e9edef';
}

function showApp() {
  stateScreen.style.display = 'none';
  appEl.style.display = 'flex';
  // Clean up QR polling
  if (pollStatusInterval) {
    clearInterval(pollStatusInterval);
    pollStatusInterval = null;
  }
}

// ===== STATUS / QR POLL =====
async function checkStatus() {
  try {
    const data = await apiGet('/api/status');
    if (data.online) {
      if (!online) {
        online = true;
        showApp();
        startOnlinePolling();
        carregarChats();
      }
    } else {
      online = false;
      // Fetch QR as data URL via /api/qr
      try {
        const qrData = await apiGetText('/api/qr');
        if (qrData && qrData.startsWith('data:')) {
          showQR(qrData);
        } else if (data.qr) {
          showQR(null);
        } else {
          showQR(null);
        }
      } catch(e) {
        showQR(null);
      }
      // Keep polling for status change
      if (!pollStatusInterval) {
        pollStatusInterval = setInterval(checkStatus, 5000);
      }
    }
  } catch(e) {
    // Server unreachable
    if (online) {
      online = false;
      showError('Servidor offline. Verifique se o WhatsApp bot está rodando.');
    } else {
      showError('Servidor offline. Verifique se o WhatsApp bot está rodando.');
    }
    if (!pollStatusInterval) {
      pollStatusInterval = setInterval(checkStatus, 5000);
    }
  }
}

// ===== CHATS =====
async function carregarChats() {
  try {
    const data = await apiGet('/api/chats');
    chats = Array.isArray(data) ? data : [];
    renderizarSidebar();
  } catch(e) {
    console.error('Erro ao carregar chats:', e);
  }
}

function renderizarSidebar() {
  const termo = searchInput.value.toLowerCase().trim();
  let filtered = chats;
  if (termo) {
    filtered = chats.filter(c => (c.name||'').toLowerCase().includes(termo) || (c.id||'').toLowerCase().includes(termo));
  }
  if (filtered.length === 0) {
    chatList.innerHTML = `<div style="text-align:center;padding:32px 16px;color:#8696a0;font-size:14px">${
      termo ? 'Nenhuma conversa encontrada' : 'Nenhuma conversa ainda'
    }</div>`;
    return;
  }
  let html = '';
  for (const c of filtered) {
    const isGroup = !!c.isGroup;
    const active = c.id === chatAtivoId;
    const initial = (c.name || c.id || '?')[0].toUpperCase();
    const preview = truncate(c.lastMessage || c.name || '', 60);
    const timeStr = fmtDate(c.timestamp);
    const unread = c.unreadCount || 0;
    html += `<div class="chat-item${active?' active':''}" data-chat-id="${esc(c.id)}">
      <div class="chat-avatar" style="background:${isGroup?'#005c4b':'#374045'}">
        ${isGroup ? '👥' : esc(initial)}
        ${isGroup ? '<span class="group-badge">👥</span>' : ''}
      </div>
      <div class="chat-info">
        <div class="chat-name">${esc(c.name || c.id)}</div>
        <div class="chat-preview">${esc(preview)}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${timeStr}</div>
        ${unread > 0 ? `<div class="chat-unread">${unread > 99 ? '99+' : unread}</div>` : ''}
      </div>
    </div>`;
  }
  chatList.innerHTML = html;

  // Click handlers
  chatList.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', () => {
      const chatId = el.dataset.chatId;
      abrirChat(chatId);
      // On mobile, close sidebar
      if (window.innerWidth <= 768) {
        sidebar.classList.remove('open');
      }
    });
  });
}

// ===== OPEN CHAT =====
function abrirChat(chatId) {
  // Clear old polling
  if (pollChatInterval) {
    clearInterval(pollChatInterval);
    pollChatInterval = null;
  }

  chatAtivoId = chatId;
  const chat = chats.find(c => c.id === chatId);
  chatAtivo = chat || { id: chatId, name: chatId, isGroup: false };

  // Update header
  chatHeaderName.textContent = chatAtivo.name || chatAtivo.id;
  chatHeaderSub.textContent = chatAtivo.isGroup ? '👥 Grupo' : '💬 Conversa';

  emptyState.style.display = 'none';
  chatContent.style.display = 'flex';

  // Update sidebar active state
  chatList.querySelectorAll('.chat-item').forEach(el => {
    el.classList.toggle('active', el.dataset.chatId === chatId);
  });

  // Enable input
  msgInput.disabled = false;
  msgInput.placeholder = '📝 Digite sua mensagem...';
  sendBtn.disabled = false;
  msgInput.focus();

  // Load messages
  carregarMensagens(chatId);

  // Start polling messages every 3s
  pollChatInterval = setInterval(() => carregarMensagens(chatId, true), 3000);
}

async function carregarMensagens(chatId, isPoll=false) {
  if (!chatId) return;
  try {
    const data = await apiGet('/api/messages/' + encodeURIComponent(chatId));
    const msgs = Array.isArray(data) ? data : [];
    renderizarMensagens(msgs, isPoll);
  } catch(e) {
    console.error('Erro ao carregar mensagens:', e);
  }
}

function renderizarMensagens(msgs, isPoll=false) {
  const wasAtBottom = isPoll && messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 80;

  let html = '';
  for (const m of msgs) {
    const fromMe = !!m.fromMe;
    const authorName = m.authorName || m.author || '';
    const body = esc(m.body || '');
    const timeStr = fmtTime(m.timestamp);
    const hasMedia = !!m.hasMedia;
    const media = m.media || null;
    const type = m.type || 'chat';

    html += `<div class="message-row ${fromMe ? 'sent' : 'received'}">`;
    // Author name for groups (received messages)
    if (chatAtivo && chatAtivo.isGroup && !fromMe && authorName) {
      html += `<div class="message-author">${esc(authorName)}</div>`;
    }
    // Media rendering
    if (hasMedia && media && media.dataUrl && !media.tooLarge) {
      const mm = media.mimetype || '';
      if (mm.startsWith('image/') || mm === 'image') {
        html += `<div class="message-bubble"><img src="${escAttr(media.dataUrl)}" style="max-width:260px;max-height:260px;border-radius:6px;display:block;margin-bottom:4px;" onerror="this.style.display='none'"><span class="message-time">${timeStr}</span></div>`;
      } else if (mm.startsWith('video/') || mm === 'video') {
        html += `<div class="message-bubble"><video controls style="max-width:260px;max-height:260px;border-radius:6px;display:block;margin-bottom:4px;" preload="metadata"><source src="${escAttr(media.dataUrl)}" type="${escAttr(mm)}"></video><span class="message-time">${timeStr}</span></div>`;
      } else if (mm.startsWith('audio/')) {
        html += `<div class="message-bubble"><audio controls style="max-width:260px;display:block;margin-bottom:4px;" preload="metadata"><source src="${escAttr(media.dataUrl)}" type="${escAttr(mm)}"></audio><span class="message-time">${timeStr}</span></div>`;
      } else {
        html += `<div class="message-bubble"><a href="${escAttr(media.dataUrl)}" download style="color:#00a884;text-decoration:underline;word-break:break-all;">📎 Baixar arquivo</a><span class="message-time">${timeStr}</span></div>`;
      }
      // Caption
      if (body) {
        html += `<div class="message-bubble" style="margin-top:2px;">${body}<span class="message-time">${timeStr}</span></div>`;
      }
    } else if (hasMedia && media && media.tooLarge) {
      const label = type === 'stickerMessage' ? '😀 Figurinha' : '📎 Arquivo grande';
      html += `<div class="message-bubble">${label} (muito grande para pré-visualização)<span class="message-time">${timeStr}</span></div>`;
    } else if (hasMedia) {
      const labels = { imageMessage:'📷 Imagem', videoMessage:'🎬 Vídeo', audioMessage:'🎤 Áudio', documentMessage:'📄 Documento', stickerMessage:'😀 Figurinha' };
      html += `<div class="message-bubble">${labels[type] || '📎 Mídia'}<span class="message-time">${timeStr}</span></div>`;
    } else if (body) {
      html += `<div class="message-bubble">${body}<span class="message-time">${timeStr}</span></div>`;
    } else {
      html += `<div class="message-bubble"><em style="color:#8696a0">Mídia sem suporte</em><span class="message-time">${timeStr}</span></div>`;
    }
    html += `</div>`;
  }
  messagesArea.innerHTML = html + '<div id="scroll-anchor"></div>';

  if (wasAtBottom || !isPoll) {
    scrollToBottom();
  }
}

function scrollToBottom() {
  const anchor = document.getElementById('scroll-anchor');
  if (anchor) anchor.scrollIntoView({behavior:'auto'});
}

// ===== SEND MESSAGE =====
async function enviarMensagem() {
  if (!chatAtivoId) return;
  const text = msgInput.value.trim();
  if (!text) return;
  if (sending) return;

  sending = true;
  sendBtn.disabled = true;
  sendError.style.display = 'none';

  try {
    const r = await fetch('/api/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chatId:chatAtivoId, message:text})
    });
    const data = await r.json();
    if (data.success) {
      msgInput.value = '';
      // Reload messages immediately
      await carregarMensagens(chatAtivoId);
      // Also refresh chat list to show last message update
      carregarChats();
    } else {
      sendError.textContent = '❌ Erro ao enviar';
      sendError.style.display = 'inline';
      setTimeout(() => { sendError.style.display = 'none'; }, 3000);
    }
  } catch(e) {
    sendError.textContent = '❌ Erro ao enviar';
    sendError.style.display = 'inline';
    setTimeout(() => { sendError.style.display = 'none'; }, 3000);
  } finally {
    sending = false;
    sendBtn.disabled = false;
  }
}

// ===== NEW CHAT =====
function novaConversa() {
  const numero = prompt('Digite o número do WhatsApp no formato 55DDNNNNNNNN:');
  if (!numero) return;
  const cleaned = numero.replace(/[^0-9]/g, '');
  if (cleaned.length < 10 || cleaned.length > 15) {
    alert('Número inválido. Use o formato 55DDNNNNNNNN (ex: 5511999999999)');
    return;
  }
  const chatId = cleaned.includes('@') ? cleaned : cleaned + '@c.us';
  // Open it directly (it'll be a virtual chat until first message)
  abrirChat(chatId);
  // On mobile, close sidebar
  if (window.innerWidth <= 768) {
    sidebar.classList.remove('open');
  }
}

// ===== ONLINE POLLING =====
function startOnlinePolling() {
  // Poll chats every 10s
  if (pollChatsInterval) clearInterval(pollChatsInterval);
  pollChatsInterval = setInterval(carregarChats, 10000);

  // Also check status periodically to detect disconnection
  if (pollStatusInterval) {
    clearInterval(pollStatusInterval);
    pollStatusInterval = null;
  }
  pollStatusInterval = setInterval(async () => {
    try {
      const data = await apiGet('/api/status');
      if (!data.online && online) {
        online = false;
        // Disconnected — go back to QR screen
        if (pollChatsInterval) { clearInterval(pollChatsInterval); pollChatsInterval = null; }
        if (pollChatInterval) { clearInterval(pollChatInterval); pollChatInterval = null; }
        if (pollStatusInterval) { clearInterval(pollStatusInterval); pollStatusInterval = null; }
        checkStatus();
      }
    } catch(e) {
      // ignore
    }
  }, 15000);
}

// ===== EVENT LISTENERS =====
// Send on Enter
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    enviarMensagem();
  }
});

// Send button
sendBtn.addEventListener('click', enviarMensagem);

// Search
searchInput.addEventListener('input', renderizarSidebar);

// New chat
newChatBtn.addEventListener('click', novaConversa);

// Back button (mobile)
backBtn.addEventListener('click', () => {
  sidebar.classList.add('open');
});

// Sidebar toggle on mobile — swipe or click open via back button handled above
// Also click outside sidebar on mobile to close
document.addEventListener('click', (e) => {
  if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
    if (!sidebar.contains(e.target) && !backBtn.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});

// ===== INIT =====
function init() {
  showLoading();
  checkStatus();
}

init();
</script>
