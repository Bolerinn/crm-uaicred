<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp - Rede Prime CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: '#f97316',
        gold: '#b8860b',
        'accent-dark': '#ea580c',
        'chat-bg': '#efeae2',
        'bubble-in': '#d9fdd3',
        'bubble-out': '#e1ffc7',
        'sidebar': '#111b21',
        'sidebar-hover': '#202c33',
        'sidebar-active': '#2a3942',
        'header-bg': '#f0f2f5',
        'input-bg': '#f0f2f5',
      }
    }
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#whatsapp-app{height:100%;width:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
#grupos-sidebar{width:380px;min-width:320px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #222d34;}
#grupos-sidebar .sidebar-header{background:#202c33;padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:60px;}
#grupos-sidebar .sidebar-header .avatar{width:42px;height:42px;border-radius:50%;background:#6b7c85;display:flex;align-items:center;justify-content:center;color:#d1d7db;font-weight:600;font-size:16px;flex-shrink:0;}
#grupos-sidebar .sidebar-header .user-info{flex:1;min-width:0;}
#grupos-sidebar .sidebar-header .user-name{color:#e9edef;font-size:16px;font-weight:500;}
#grupos-sidebar .sidebar-header .user-role{color:#8696a0;font-size:13px;}
#grupos-sidebar .sidebar-header .logout-btn{color:#8696a0;cursor:pointer;padding:8px;border-radius:50%;transition:background .2s;font-size:18px;line-height:1;}
#grupos-sidebar .sidebar-header .logout-btn:hover{background:#2a3942;color:#e9edef;}
.search-box{padding:8px 12px;background:#111b21;}
.search-box .search-inner{background:#202c33;border-radius:8px;display:flex;align-items:center;padding:0 12px;height:38px;}
.search-box .search-inner svg{color:#8696a0;flex-shrink:0;}
.search-box .search-inner input{flex:1;background:transparent;border:none;outline:none;color:#d1d7db;font-size:14px;padding:0 16px 0 12px;height:100%;}
.search-box .search-inner input::placeholder{color:#8696a0;}
#lista-grupos{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#374045 #111b21;}
#lista-grupos::-webkit-scrollbar{width:6px;}
#lista-grupos::-webkit-scrollbar-track{background:#111b21;}
#lista-grupos::-webkit-scrollbar-thumb{background:#374045;border-radius:3px;}
.grupo-item{display:flex;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid #182229;transition:background .15s;gap:12px;}
.grupo-item:hover{background:#202c33;}
.grupo-item.active{background:#2a3942;}
.grupo-item .grupo-avatar{width:49px;height:49px;border-radius:50%;background:#374045;display:flex;align-items:center;justify-content:center;color:#d1d7db;font-weight:500;font-size:18px;flex-shrink:0;overflow:hidden;}
.grupo-item .grupo-avatar img{width:100%;height:100%;object-fit:cover;}
.grupo-item .grupo-info{flex:1;min-width:0;}
.grupo-item .grupo-nome{color:#e9edef;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.grupo-item .grupo-ultima{color:#8696a0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.grupo-item .grupo-meta{text-align:right;flex-shrink:0;}
.grupo-item .grupo-hora{color:#8696a0;font-size:11px;}
.grupo-item .grupo-badge{background:#f97316;color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:20px;text-align:center;margin-top:4px;display:inline-block;}
#lista-vazia{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8696a0;padding:24px;text-align:center;}
#lista-vazia svg{margin-bottom:16px;opacity:.5;}
#lista-vazia p{font-size:14px;}
#chat-painel{flex:1;display:flex;flex-direction:column;background:#efeae2;position:relative;overflow:hidden;}
#chat-painel::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h400v400H0z' fill='%23efeae2'/%3E%3Cpath d='M200 200c-40 0-72.5 32.5-72.5 72.5S160 345 200 345s72.5-32.5 72.5-72.5S240 200 200 200z' fill='%23d4c8b6' opacity='0.08'/%3E%3C/svg%3E") repeat;opacity:1;pointer-events:none;}
.chat-header{background:#f0f2f5;padding:10px 16px;display:flex;align-items:center;gap:12px;min-height:60px;z-index:1;border-bottom:1px solid #d1d7db;}
.chat-header .chat-avatar{width:42px;height:42px;border-radius:50%;background:#dfe5e7;display:flex;align-items:center;justify-content:center;color:#54656f;font-weight:600;font-size:18px;flex-shrink:0;}
.chat-header .chat-info{flex:1;min-width:0;}
.chat-header .chat-nome{font-size:17px;font-weight:500;color:#111b21;}
.chat-header .chat-membros{font-size:13px;color:#667781;}
.chat-header .back-btn{display:none;color:#54656f;cursor:pointer;padding:8px;border-radius:50%;font-size:20px;}
#chat-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;color:#667781;text-align:center;padding:24px;}
#chat-placeholder svg{margin-bottom:20px;opacity:.6;}
#chat-placeholder h2{font-size:24px;font-weight:300;color:#41525d;margin-bottom:12px;}
#chat-placeholder p{font-size:14px;max-width:500px;line-height:1.6;}
#chat-mensagens{flex:1;overflow-y:auto;padding:20px 50px;display:none;flex-direction:column;gap:6px;z-index:1;scrollbar-width:thin;scrollbar-color:#c1c1c1 transparent;}
#chat-mensagens.show{display:flex;}
#chat-mensagens::-webkit-scrollbar{width:6px;}
#chat-mensagens::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px;}
.msg-row{display:flex;margin-bottom:2px;}
.msg-row.outgoing{justify-content:flex-end;}
.msg-bubble{max-width:65%;padding:6px 12px 6px 9px;border-radius:8px;position:relative;font-size:14.2px;line-height:1.4;word-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.08);}
.msg-row.incoming .msg-bubble{background:#fff;border-radius:0 8px 8px 8px;}
.msg-row.outgoing .msg-bubble{background:#d9fdd3;border-radius:8px 0 8px 8px;}
.msg-meta{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:2px;font-size:11px;color:#667781;}
.msg-row.outgoing .msg-meta{color:#53bdeb;}
.msg-meta .msg-hora{font-size:11px;}
.msg-meta .msg-check{color:#53bdeb;font-size:13px;}
.msg-row.incoming .msg-meta .msg-check{color:#8696a0;}
.msg-sender{font-size:12.5px;font-weight:600;color:#f97316;margin-bottom:2px;}
.msg-date-divider{text-align:center;margin:12px 0;z-index:1;}
.msg-date-divider span{background:#e1f2fb;color:#54656f;font-size:12.5px;padding:5px 12px;border-radius:5px;box-shadow:0 1px 1px rgba(0,0,0,.08);}
#chat-input-area{background:#f0f2f5;padding:8px 12px;display:none;align-items:center;gap:10px;z-index:1;border-top:1px solid #d1d7db;}
#chat-input-area.show{display:flex;}
#chat-input-area textarea{flex:1;background:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:15px;resize:none;outline:none;max-height:100px;min-height:42px;font-family:inherit;line-height:1.4;}
#chat-input-area .send-btn{width:42px;height:42px;border-radius:50%;background:#f97316;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;color:#fff;flex-shrink:0;}
#chat-input-area .send-btn:hover{background:#ea580c;}
#chat-input-area .send-btn:disabled{background:#8696a0;cursor:not-allowed;}
#whatsapp-toast{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.25);animation:toastIn .3s ease,toastOut .3s ease 3.2s forwards;max-width:360px;pointer-events:auto;}
.toast.success{border-left:4px solid #22c55e;}
.toast.error{border-left:4px solid #ef4444;}
.toast.info{border-left:4px solid #3b82f6;}
@keyframes toastIn{from{opacity:0;transform:translateX(50px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(50px);}}
.loading-spinner{width:28px;height:28px;border:3px solid #202c33;border-top-color:#f97316;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#111b21;display:flex;align-items:center;justify-content:center;z-index:10000;flex-direction:column;}
.auth-overlay .auth-logo{color:#f97316;font-size:32px;font-weight:700;margin-bottom:24px;}
.auth-overlay .auth-form{background:#202c33;padding:32px;border-radius:12px;width:360px;max-width:90vw;}
.auth-overlay .auth-form label{color:#e9edef;font-size:14px;display:block;margin-bottom:6px;}
.auth-overlay .auth-form input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #374045;background:#111b21;color:#e9edef;font-size:15px;margin-bottom:16px;outline:none;}
.auth-overlay .auth-form input:focus{border-color:#f97316;}
.auth-overlay .auth-form button{width:100%;padding:12px;border-radius:8px;background:#f97316;color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:background .2s;}
.auth-overlay .auth-form button:hover{background:#ea580c;}
.auth-overlay .auth-error{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;}
@media(max-width:768px){
  #grupos-sidebar{width:100%;min-width:100%;position:absolute;left:0;top:0;bottom:0;z-index:10;transition:transform .3s;}
  #grupos-sidebar.hidden-mobile{transform:translateX(-100%);}
  #chat-painel{position:absolute;left:0;top:0;right:0;bottom:0;}
  .chat-header .back-btn{display:block;}
  #chat-mensagens{padding:15px 12px;}
}
</style>
</head>
<body>

<div id="whatsapp-app" style="display:flex;height:100%;">
  <!-- Auth overlay -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-logo">🔷 Rede Prime CRM</div>
    <div class="auth-form">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="seu@email.com" autocomplete="username">
      <label>Senha</label>
      <input type="password" id="auth-password" placeholder="Sua senha" autocomplete="current-password">
      <button id="auth-submit">Entrar</button>
      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="grupos-sidebar">
    <div class="sidebar-header">
      <div class="avatar" id="user-avatar">U</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Carregando...</div>
        <div class="user-role" id="user-role"></div>
      </div>
      <div class="logout-btn" id="logout-btn" title="Sair">&#10005;</div>
    </div>
    <div class="search-box">
      <div class="search-inner">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3 0-3.7-3-6.7-6.7-6.7S3 6 3 9.7s3 6.7 6.7 6.7c1.6 0 3.2-.6 4.3-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5-5.2zm-6.2 0c-2.6 0-4.6-2.1-4.6-4.6 0-2.6 2.1-4.6 4.6-4.6 2.6 0 4.6 2.1 4.6 4.6 0 2.6-2 4.6-4.6 4.6z"/></svg>
        <input type="text" id="search-input" placeholder="Pesquisar grupos...">
      </div>
    </div>
    <div id="lista-grupos">
      <div id="lista-vazia">
        <svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <p>Nenhum grupo encontrado</p>
      </div>
    </div>
  </div>

  <!-- Chat panel -->
  <div id="chat-painel">
    <div class="chat-header" id="chat-header" style="display:none;">
      <div class="back-btn" id="back-btn">&#8592;</div>
      <div class="chat-avatar" id="chat-avatar">G</div>
      <div class="chat-info">
        <div class="chat-nome" id="chat-nome">Selecione um grupo</div>
        <div class="chat-membros" id="chat-membros"></div>
      </div>
    </div>
    <div id="chat-placeholder">
      <svg viewBox="0 0 303 172" width="250" height="140" fill="none"><rect x="0.5" y="0.5" width="302" height="171" rx="7.5" fill="#fff" stroke="#e9edef"/><circle cx="55" cy="48" r="20" fill="#dfe5e7"/><circle cx="151" cy="48" r="20" fill="#dfe5e7"/><circle cx="247" cy="48" r="20" fill="#dfe5e7"/><rect x="20" y="84" width="262" height="12" rx="6" fill="#dfe5e7"/><rect x="20" y="104" width="200" height="12" rx="6" fill="#dfe5e7"/><rect x="20" y="124" width="240" height="12" rx="6" fill="#dfe5e7"/></svg>
      <h2>WhatsApp CRM</h2>
      <p>Selecione um grupo na lista à esquerda para visualizar as mensagens. Apenas usuários com perfil master têm acesso a esta funcionalidade.</p>
    </div>
    <div id="chat-mensagens"></div>
    <div id="chat-input-area">
      <textarea id="msg-input" rows="1" placeholder="Digite uma mensagem..." disabled></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="whatsapp-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var WhatsApp = (function(){
  'use strict';

  // ── Config ────────────────────────────────────────────────
  var SUPABASE_URL = 'https://dztiktcvueorlafiocdf.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_jsQh5PSYqwvGcJeS2CRWRw_jhhO59PK';
  var WHATSAPP_NUMBER = '557192057760';

  // ── State ─────────────────────────────────────────────────
  var supabase = null;
  var session = null;
  var currentUser = null;
  var grupos = [];
  var grupoAtivo = null;
  var mensagensCache = {};
  var realtimeChannel = null;
  var initialized = false;

  // ── DOM refs ──────────────────────────────────────────────
  var $ = function(id){ return document.getElementById(id); };
  var dom = {
    authOverlay:    $('auth-overlay'),
    authEmail:      $('auth-email'),
    authPassword:   $('auth-password'),
    authSubmit:     $('auth-submit'),
    authError:      $('auth-error'),
    userAvatar:     $('user-avatar'),
    userName:       $('user-name'),
    userRole:       $('user-role'),
    logoutBtn:      $('logout-btn'),
    searchInput:    $('search-input'),
    listaGrupos:    $('lista-grupos'),
    listaVazia:     $('lista-vazia'),
    gruposSidebar:  $('grupos-sidebar'),
    chatPainel:     $('chat-painel'),
    chatHeader:     $('chat-header'),
    chatAvatar:     $('chat-avatar'),
    chatNome:       $('chat-nome'),
    chatMembros:    $('chat-membros'),
    backBtn:        $('back-btn'),
    chatPlaceholder:$('chat-placeholder'),
    chatMensagens:  $('chat-mensagens'),
    chatInputArea:  $('chat-input-area'),
    msgInput:       $('msg-input'),
    sendBtn:        $('send-btn'),
    toastContainer: $('whatsapp-toast')
  };

  // ── Helpers ───────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
  }

  function formatHora(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var h = d.getHours();
    var m = d.getMinutes();
    return (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
  }

  function formatData(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    var hoje = new Date();
    hoje.setHours(0,0,0,0);
    var ontem = new Date(hoje);
    ontem.setDate(ontem.getDate() - 1);
    var dataMsg = new Date(d);
    dataMsg.setHours(0,0,0,0);
    if (dataMsg.getTime() === hoje.getTime()) return 'Hoje';
    if (dataMsg.getTime() === ontem.getTime()) return 'Ontem';
    return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
  }

  function getIniciais(nome) {
    if (!nome) return '?';
    var partes = String(nome).trim().split(/\s+/);
    if (partes.length === 1) return partes[0].substring(0,2).toUpperCase();
    return (partes[0].charAt(0) + partes[partes.length-1].charAt(0)).toUpperCase();
  }

  function toast(msg, tipo) {
    tipo = tipo || 'info';
    var el = document.createElement('div');
    el.className = 'toast ' + tipo;
    el.textContent = msg;
    dom.toastContainer.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3600);
  }

  // ── Auth ──────────────────────────────────────────────────
  function initSupabase() {
    if (typeof supabase === 'undefined' && typeof window.supabase !== 'undefined') {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
    if (typeof supabase !== 'undefined' && supabase.createClient) {
      supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
    return !!supabase;
  }

  function checkAuth() {
    if (!supabase) return;
    supabase.auth.getSession().then(function(res) {
      if (res.error) {
        showAuth();
        return;
      }
      if (res.data && res.data.session) {
        session = res.data.session;
        currentUser = session.user;
        verifyMaster();
      } else {
        showAuth();
      }
    });
  }

  function verifyMaster() {
    if (!currentUser) { showAuth(); return; }
    supabase
      .from('usuarios')
      .select('id, nome, email, perfil, ativo')
      .eq('id', currentUser.id)
      .single()
      .then(function(res) {
        if (res.error || !res.data) {
          toast('Erro ao verificar permissões.', 'error');
          showAuth();
          return;
        }
        var user = res.data;
        if (user.perfil !== 'master') {
          toast('Acesso restrito. Apenas usuários master podem acessar o WhatsApp.', 'error');
          supabase.auth.signOut();
          showAuth();
          return;
        }
        if (!user.ativo) {
          toast('Usuário inativo. Entre em contato com o administrador.', 'error');
          supabase.auth.signOut();
          showAuth();
          return;
        }
        currentUser = user;
        hideAuth();
        initApp();
      });
  }

  function showAuth() {
    dom.authOverlay.style.display = 'flex';
    dom.gruposSidebar.style.display = 'none';
    dom.chatPainel.style.display = 'none';
  }

  function hideAuth() {
    dom.authOverlay.style.display = 'none';
    dom.gruposSidebar.style.display = 'flex';
    dom.chatPainel.style.display = 'flex';
  }

  function doLogin() {
    var email = dom.authEmail.value.trim();
    var password = dom.authPassword.value;
    if (!email || !password) {
      dom.authError.textContent = 'Preencha email e senha.';
      return;
    }
    dom.authError.textContent = '';
    dom.authSubmit.disabled = true;
    dom.authSubmit.textContent = 'Entrando...';
    supabase.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
      dom.authSubmit.disabled = false;
      dom.authSubmit.textContent = 'Entrar';
      if (res.error) {
        dom.authError.textContent = res.error.message || 'Erro ao fazer login.';
        return;
      }
      session = res.data.session;
      currentUser = res.data.user;
      verifyMaster();
    });
  }

  function doLogout() {
    supabase.auth.signOut().then(function() {
      session = null;
      currentUser = null;
      grupos = [];
      grupoAtivo = null;
      showAuth();
      if (realtimeChannel) {
        realtimeChannel.unsubscribe();
        realtimeChannel = null;
      }
    });
  }

  // ── App Init ──────────────────────────────────────────────
  function initApp() {
    if (initialized) return;
    initialized = true;
    dom.userName.textContent = currentUser.nome || currentUser.email || 'Usuário';
    dom.userAvatar.textContent = getIniciais(currentUser.nome || currentUser.email || 'U');
    dom.userRole.textContent = 'Master';
    loadGrupos();
    setupRealtime();
  }

  // ── Grupos ────────────────────────────────────────────────
  function loadGrupos() {
    if (!currentUser) return;
    showSpinner();
    supabase
      .from('whatsapp_grupos')
      .select('*')
      .eq('analista_id', currentUser.id)
      .order('created_at', { ascending: false })
      .then(function(res) {
        hideSpinner();
        if (res.error) {
          toast('Erro ao carregar grupos: ' + res.error.message, 'error');
          return;
        }
        grupos = res.data || [];
        renderGrupos();
      });
  }

  function showSpinner() {
    hideSpinner();
    var spin = document.createElement('div');
    spin.className = 'loading-spinner';
    spin.id = 'grupos-spinner';
    dom.listaGrupos.insertBefore(spin, dom.listaGrupos.firstChild);
    dom.listaVazia.style.display = 'none';
  }

  function hideSpinner() {
    var spin = document.getElementById('grupos-spinner');
    if (spin) spin.parentNode.removeChild(spin);
  }

  function renderGrupos(filtro) {
    var container = dom.listaGrupos;
    // Remove items, keep spinner and vazia
    var items = container.querySelectorAll('.grupo-item');
    for (var i = 0; i < items.length; i++) {
      items[i].parentNode.removeChild(items[i]);
    }
    var lista = filtro ? grupos.filter(function(g) {
      return (g.nome || '').toLowerCase().indexOf(filtro.toLowerCase()) !== -1;
    }) : grupos;

    if (lista.length === 0) {
      dom.listaVazia.style.display = 'flex';
      return;
    }
    dom.listaVazia.style.display = 'none';

    for (var j = 0; j < lista.length; j++) {
      var g = lista[j];
      var el = document.createElement('div');
      el.className = 'grupo-item' + (grupoAtivo && grupoAtivo.id === g.id ? ' active' : '');
      el.setAttribute('data-id', g.id);
      el.innerHTML =
        '<div class="grupo-avatar">' + esc(getIniciais(g.nome)) + '</div>' +
        '<div class="grupo-info">' +
          '<div class="grupo-nome">' + esc(g.nome || 'Sem nome') + '</div>' +
          '<div class="grupo-ultima">' + esc(g.descricao || '') + '</div>' +
        '</div>' +
        '<div class="grupo-meta">' +
          '<div class="grupo-hora">' + (g.created_at ? formatHora(g.created_at) : '') + '</div>' +
        '</div>';
      el.addEventListener('click', (function(grupo) {
        return function() { selecionarGrupo(grupo); };
      })(g));
      container.appendChild(el);
    }
  }

  function selecionarGrupo(grupo) {
    grupoAtivo = grupo;
    // Update active state
    var items = dom.listaGrupos.querySelectorAll('.grupo-item');
    for (var i = 0; i < items.length; i++) {
      var id = items[i].getAttribute('data-id');
      if (id === String(grupo.id)) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }
    // Update chat header
    dom.chatHeader.style.display = 'flex';
    dom.chatPlaceholder.style.display = 'none';
    dom.chatMensagens.classList.add('show');
    dom.chatInputArea.classList.add('show');
    dom.chatNome.textContent = grupo.nome || 'Sem nome';
    dom.chatAvatar.textContent = getIniciais(grupo.nome);
    dom.chatMembros.textContent = grupo.descricao || '';
    dom.msgInput.disabled = false;
    dom.sendBtn.disabled = false;
    // Load messages
    loadMensagens(grupo.id);
    // Mobile: hide sidebar
    if (window.innerWidth <= 768) {
      dom.gruposSidebar.classList.add('hidden-mobile');
    }
  }

  // ── Mensagens ─────────────────────────────────────────────
  function loadMensagens(grupoId) {
    dom.chatMensagens.innerHTML = '';
    supabase
      .from('whatsapp_mensagens')
      .select('*')
      .eq('grupo_id', grupoId)
      .order('created_at', { ascending: true })
      .then(function(res) {
        if (res.error) {
          toast('Erro ao carregar mensagens: ' + res.error.message, 'error');
          return;
        }
        var msgs = res.data || [];
        mensagensCache[grupoId] = msgs;
        renderMensagens(msgs, grupoId);
      });
  }

  function renderMensagens(msgs, grupoId) {
    if (!grupoAtivo || grupoAtivo.id !== grupoId) return;
    dom.chatMensagens.innerHTML = '';
    if (msgs.length === 0) {
      dom.chatMensagens.innerHTML = '<div style="text-align:center;color:#667781;padding:40px;">Nenhuma mensagem ainda. Envie a primeira!</div>';
      return;
    }
    var ultimaData = '';
    for (var i = 0; i < msgs.length; i++) {
      var m = msgs[i];
      var dataAtual = formatData(m.created_at);
      if (dataAtual !== ultimaData) {
        ultimaData = dataAtual;
        var divider = document.createElement('div');
        divider.className = 'msg-date-divider';
        divider.innerHTML = '<span>' + esc(dataAtual) + '</span>';
        dom.chatMensagens.appendChild(divider);
      }
      var outgoing = currentUser && m.remetente_id === currentUser.id;
      var row = document.createElement('div');
      row.className = 'msg-row ' + (outgoing ? 'outgoing' : 'incoming');
      var senderHtml = '';
      if (!outgoing && m.remetente_nome) {
        senderHtml = '<div class="msg-sender">' + esc(m.remetente_nome) + '</div>';
      }
      row.innerHTML =
        '<div class="msg-bubble">' +
          senderHtml +
          '<span>' + esc(m.conteudo || '') + '</span>' +
          '<div class="msg-meta">' +
            '<span class="msg-hora">' + esc(formatHora(m.created_at)) + '</span>' +
            (outgoing ? '<span class="msg-check">&#10003;&#10003;</span>' : '') +
          '</div>' +
        '</div>';
      dom.chatMensagens.appendChild(row);
    }
    scrollToBottom();
  }

  function scrollToBottom() {
    setTimeout(function() {
      dom.chatMensagens.scrollTop = dom.chatMensagens.scrollHeight;
    }, 50);
  }

  function sendMessage() {
    if (!grupoAtivo || !currentUser) return;
    var conteudo = dom.msgInput.value.trim();
    if (!conteudo) return;
    dom.sendBtn.disabled = true;
    dom.msgInput.disabled = true;
    supabase
      .from('whatsapp_mensagens')
      .insert({
        grupo_id: grupoAtivo.id,
        remetente_id: currentUser.id,
        remetente_nome: currentUser.nome || currentUser.email,
        conteudo: conteudo,
        whatsapp_number: WHATSAPP_NUMBER
      })
      .select()
      .then(function(res) {
        dom.sendBtn.disabled = false;
        dom.msgInput.disabled = false;
        dom.msgInput.value = '';
        dom.msgInput.focus();
        if (res.error) {
          toast('Erro ao enviar mensagem: ' + res.error.message, 'error');
          return;
        }
        // Inserted message will come via realtime, but also add locally
        if (res.data && res.data.length > 0) {
          var groupId = grupoAtivo.id;
          if (!mensagensCache[groupId]) mensagensCache[groupId] = [];
          mensagensCache[groupId].push(res.data[0]);
          renderMensagens(mensagensCache[groupId], groupId);
        }
      });
  }

  // ── Realtime ──────────────────────────────────────────────
  function setupRealtime() {
    if (!supabase) return;
    realtimeChannel = supabase
      .channel('whatsapp-realtime')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'whatsapp_mensagens' },
        function(payload) {
          var nova = payload.new;
          if (!nova || !grupoAtivo) return;
          if (nova.grupo_id !== grupoAtivo.id) return;
          // Avoid duplicate if we already inserted locally
          var cache = mensagensCache[grupoAtivo.id] || [];
          var exists = false;
          for (var i = 0; i < cache.length; i++) {
            if (cache[i].id === nova.id) { exists = true; break; }
          }
          if (!exists) {
            cache.push(nova);
            mensagensCache[grupoAtivo.id] = cache;
            renderMensagens(cache, grupoAtivo.id);
          }
        }
      )
      .subscribe(function(status) {
        if (status === 'SUBSCRIBED') {
          console.log('WhatsApp: realtime conectado');
        } else if (status === 'CHANNEL_ERROR') {
          console.error('WhatsApp: erro de conexão realtime');
          toast('Erro na conexão em tempo real. Recarregue a página.', 'error');
        }
      });
  }

  // ── Search ────────────────────────────────────────────────
  function filterGrupos() {
    var q = dom.searchInput.value.trim();
    renderGrupos(q);
  }

  // ── Mobile back button ────────────────────────────────────
  function backToList() {
    grupoAtivo = null;
    dom.chatHeader.style.display = 'none';
    dom.chatPlaceholder.style.display = 'flex';
    dom.chatMensagens.classList.remove('show');
    dom.chatInputArea.classList.remove('show');
    dom.msgInput.value = '';
    var items = dom.listaGrupos.querySelectorAll('.grupo-item');
    for (var i = 0; i < items.length; i++) {
      items[i].classList.remove('active');
    }
    if (window.innerWidth <= 768) {
      dom.gruposSidebar.classList.remove('hidden-mobile');
    }
  }

  // ── Event binding ─────────────────────────────────────────
  function bindEvents() {
    dom.authSubmit.addEventListener('click', doLogin);
    dom.authPassword.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
    dom.logoutBtn.addEventListener('click', doLogout);
    dom.searchInput.addEventListener('input', filterGrupos);
    dom.sendBtn.addEventListener('click', sendMessage);
    dom.msgInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    dom.backBtn.addEventListener('click', backToList);

    // Auto-resize textarea
    dom.msgInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // Responsive handling
    window.addEventListener('resize', function() {
      if (window.innerWidth > 768) {
        dom.gruposSidebar.classList.remove('hidden-mobile');
      }
    });
  }

  // ── Public API ────────────────────────────────────────────
  var api = {
    init: function() {
      if (!initSupabase()) {
        dom.authError.textContent = 'Erro ao inicializar conexão. Recarregue a página.';
        return;
      }
      bindEvents();
      checkAuth();

      // Listen for auth state changes
      supabase.auth.onAuthStateChange(function(event, newSession) {
        if (event === 'SIGNED_OUT') {
          session = null;
          currentUser = null;
          showAuth();
        } else if (event === 'SIGNED_IN' && newSession) {
          session = newSession;
          currentUser = newSession.user;
          verifyMaster();
        }
      });
    },
    getSession: function() { return session; },
    getCurrentUser: function() { return currentUser; },
    refreshGrupos: function() { loadGrupos(); }
  };

  return api;
})();

// Auto-init when DOM is ready
document.addEventListener('DOMContentLoaded', function() {
  WhatsApp.init();
});
</script>
</body>
</html>
